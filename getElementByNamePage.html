<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="radio" name="ff" value="One">1
    <input type="radio" name="ff" value="Two">2
    <input type="radio" name="ff" value="Three">3
    <button type="text" id="btn" onclick="calc()">Click me</button>
    <h3 id="output"></h3>
</body>
</html>

<script>
    
    var output = document.getElementById("output");
    var btn = document.getElementById("btn");
function calc(){
    var a = document.getElementsByName("ff");
    a.forEach((ff) => {
        if(ff.checked){
        output.innerText = `${"You clicked "+ff.value}`; 
        }
    });
}
        
    //document.getElementsByName()

</script>
